    <style>
      /* Hallmark · pre-emit critique: P5 H4 E4 S5 R4 V4 */
      :root {
        --paper: #f8f5ec;
        --cream: #f4eedf;
        --ink: #1a1a1a;
        --opening-ink: #26231f;
        --opening-paper: #f8f5ec;
        --opening-paper-deep: #eee6d6;
        --green: #6b4f3a;
        --gold: #b79b64;
        --focus: rgba(183, 155, 100, 0.88);
        --line: rgba(26, 26, 26, 0.1);
        --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow-x: clip;
        background: var(--paper);
        color: var(--ink);
        font-family: "Zen Old Mincho", "Hiragino Mincho ProN", serif;
      }

      body.is-opening {
        overflow: hidden;
      }

      .opening {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        overflow: hidden;
        padding: clamp(40px, 8vw, 96px) clamp(32px, 11vw, 176px);
        background:
          linear-gradient(90deg, rgba(248, 245, 236, 0.98) 0%, rgba(248, 245, 236, 0.94) 58%, rgba(248, 245, 236, 0.88) 100%),
          radial-gradient(circle at 82% 16%, rgba(183, 155, 100, 0.08), transparent 34%),
          linear-gradient(145deg, rgba(238, 230, 214, 0.44), rgba(255, 255, 255, 0.18) 42%, rgba(238, 230, 214, 0.22));
        background-color: var(--opening-paper);
        transition:
          opacity 860ms var(--ease),
          transform 1040ms var(--ease-out),
          visibility 860ms var(--ease);
      }

      .opening::before,
      .opening::after {
        position: absolute;
        inset: -12%;
        content: "";
        pointer-events: none;
      }

      .opening::before {
        background:
          repeating-linear-gradient(2deg, rgba(107, 79, 58, 0.024) 0 1px, transparent 1px 14px),
          repeating-linear-gradient(92deg, rgba(183, 155, 100, 0.02) 0 1px, transparent 1px 18px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(238, 230, 214, 0.08)),
          url("/top/sections/04_%E4%B8%BB%E3%81%AA%E5%8F%96%E3%82%8A%E7%B5%84%E3%81%BF/assets/figma-current/paper-bg-pc.webp") center center / cover no-repeat;
        mix-blend-mode: multiply;
        opacity: 0.72;
        transform: translate3d(-10px, -8px, 0);
        animation: opening-paper-breathe 7200ms ease-in-out infinite alternate;
      }

      .opening::after {
        inset: auto clamp(36px, 8vw, 128px) clamp(48px, 10vh, 104px) auto;
        display: block;
        width: min(420px, 32vw);
        height: 1px;
        background: linear-gradient(90deg, rgba(183, 155, 100, 0), rgba(183, 155, 100, 0.46), rgba(183, 155, 100, 0));
        opacity: 0;
        transform: scaleX(0.72);
        transform-origin: right center;
        animation: opening-ambient-line 1900ms var(--ease-out) 1840ms forwards;
      }

      .opening__inner {
        position: relative;
        z-index: 2;
        width: min(840px, 100%);
        color: var(--opening-ink);
        text-align: left;
      }

      .opening__inner::before {
        position: absolute;
        top: clamp(-40px, -3.5vw, -24px);
        left: 0;
        width: min(128px, 18vw);
        height: 1px;
        background: linear-gradient(90deg, rgba(183, 155, 100, 0.72), rgba(183, 155, 100, 0.18), rgba(183, 155, 100, 0));
        content: "";
        opacity: 0;
        transform: scaleX(0.42);
        transform-origin: left center;
        animation: opening-kicker-rule 1680ms var(--ease-out) 760ms forwards;
      }

      .opening__kicker {
        margin: 0 0 clamp(28px, 5vw, 56px);
        color: rgba(107, 79, 58, 0.58);
        font-family: "Zen Old Mincho", "Hiragino Mincho ProN", serif;
        font-size: clamp(14px, 1.25vw, 16px);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        opacity: 0;
        transform: translate3d(0, 10px, 0);
        animation: opening-subtle-in 1500ms var(--ease) 420ms forwards;
      }

      .opening__text {
        display: grid;
        gap: clamp(16px, 2.6vw, 30px);
        min-width: 0;
        margin: 0;
        color: var(--opening-ink);
        font-size: clamp(42px, 6.2vw, 88px);
        font-weight: 600;
        line-height: 1.28;
        letter-spacing: 0.085em;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.48);
      }

      .opening__line {
        display: block;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
      }

      .char {
        display: inline-block;
        opacity: 0;
        filter: blur(5px);
        transform: translate3d(0, 10px, 0);
      }

      .opening .char {
        animation: opening-letter 1280ms var(--ease-out) forwards;
        animation-delay: calc(520ms + var(--line) * 620ms + var(--i) * 68ms);
      }

      .opening__rule {
        display: block;
        position: relative;
        width: min(360px, 58vw);
        height: 18px;
        margin-top: clamp(30px, 5vw, 58px);
        overflow: hidden;
      }

      .opening__rule::before,
      .opening__rule::after {
        position: absolute;
        left: 0;
        content: "";
        transform: scaleX(0);
        transform-origin: left center;
      }

      .opening__rule::before {
        top: 8px;
        width: 100%;
        height: 1px;
        background: linear-gradient(90deg, rgba(183, 155, 100, 0.82), rgba(183, 155, 100, 0.16), rgba(183, 155, 100, 0));
        animation: opening-rule 1740ms var(--ease-out) 2380ms forwards;
      }

      .opening__rule::after {
        top: 11px;
        width: 72%;
        height: 1px;
        background: linear-gradient(90deg, rgba(107, 79, 58, 0.28), rgba(107, 79, 58, 0));
        animation: opening-rule 1960ms var(--ease-out) 2520ms forwards;
      }

      .opening.is-leaving {
        opacity: 0;
        visibility: hidden;
        transform: translate3d(0, -10px, 0);
      }

      .opening.is-leaving .char {
        animation: opening-letter-out 940ms var(--ease) forwards;
        animation-delay: calc(var(--i) * 32ms);
      }

      .global-header {
        position: fixed;
        top: 28px;
        right: clamp(24px, 2vw, 40px);
        left: clamp(24px, 2vw, 40px);
        z-index: 940;
        display: flex;
        align-items: center;
        justify-content: space-between;
        color: var(--green);
        pointer-events: none;
        opacity: 0;
        transform: translate3d(0, -12px, 0);
        transition:
          opacity 900ms var(--ease),
          transform 1100ms var(--ease-out);
      }

      body.is-ready .global-header {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      .global-brand {
        display: inline-flex;
        align-items: center;
        gap: 13px;
        color: inherit;
        text-decoration: none;
        pointer-events: auto;
        position: relative;
        z-index: 3;
      }

      .global-brand__mark {
        display: block;
        width: 48px;
        height: 48px;
        object-fit: contain;
        object-position: center;
        filter: saturate(0.95) contrast(1.08) brightness(0.94);
        transform: scale(2.22);
        transform-origin: center;
      }

      .global-brand__copy {
        display: grid;
        gap: 6px;
      }

      .global-brand__ja {
        font-size: 20px;
        font-weight: 700;
        line-height: 1.1;
        letter-spacing: 0.06em;
        white-space: nowrap;
      }

      .global-brand__en {
        color: rgba(107, 79, 58, 0.56);
        font-family: "Zen Old Mincho", "Hiragino Mincho ProN", serif;
        font-size: 14px;
        line-height: 1;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        transform: none;
        transform-origin: left center;
        white-space: nowrap;
      }

      .global-nav {
        position: absolute;
        top: calc(100% + 10px);
        right: 0;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        width: 128px;
        height: 317px;
        padding: 8px 0;
        border: 0;
        border-radius: 16px;
        background: rgba(232, 228, 222, 0.72);
        box-shadow:
          0 12px 36px rgba(26, 26, 26, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.42);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translate3d(0, 8px, 0) scale(0.98);
        transform-origin: top right;
        transition:
          opacity 420ms var(--ease),
          visibility 420ms var(--ease),
          transform 620ms var(--ease-out);
      }

      body.is-nav-open .global-nav {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transform: translate3d(0, 0, 0) scale(1);
      }

      .global-nav a {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        min-height: 43px;
        width: 100%;
        padding: 12px 16px;
        color: #333333;
        font-family: "Zen Old Mincho", "Hiragino Mincho ProN", serif;
        font-size: 16px;
        font-weight: 400;
        line-height: 1.2;
        letter-spacing: 0;
        text-decoration: none;
        white-space: nowrap;
        opacity: 0;
        text-shadow:
          0 0 6px rgba(255, 255, 255, 1),
          0 0 6px rgba(255, 255, 255, 1),
          0 0 6px rgba(255, 255, 255, 1),
          0 0 8px rgba(0, 0, 0, 0.25);
        transform: translate3d(0, 4px, 0);
        transition:
          color 260ms var(--ease),
          opacity 520ms var(--ease),
          transform 760ms var(--ease-out);
        transition-delay: 0ms;
      }

      .global-nav a:hover,
      .global-nav a:focus-visible {
        color: var(--green);
      }

      body.is-nav-open .global-nav a {
        opacity: 1;
        transform: translate3d(0, 0, 0);
        transition-delay: calc(120ms + var(--nav-index, 0) * 64ms);
      }

      .global-brand:focus-visible,
      .global-nav a:focus-visible,
      .global-menu:focus-visible,
      .scroll-cue:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 4px;
      }

      .global-menu {
        display: grid;
        place-items: center;
        position: relative;
        z-index: 4;
        width: 64px;
        height: 46px;
        padding: 0;
        border: 1px solid rgba(29, 28, 24, 0.72);
        border-radius: 999px;
        background: transparent;
        cursor: pointer;
        pointer-events: auto;
      }

      .global-menu span {
        display: block;
        position: absolute;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 1px;
        background: rgba(107, 79, 58, 0.78);
        transition:
          transform 520ms var(--ease-out),
          opacity 360ms var(--ease),
          width 420ms var(--ease);
        will-change: transform, opacity;
      }

      .global-menu span:nth-child(1) {
        transform: translate3d(-50%, -6px, 0);
      }

      .global-menu span:nth-child(2) {
        transform: translate3d(-50%, 0, 0);
      }

      .global-menu span:nth-child(3) {
        transform: translate3d(-50%, 6px, 0);
      }

      .global-menu:hover span,
      .global-menu:focus-visible span {
        width: 20px;
      }

      body.is-nav-open .global-menu span:nth-child(1) {
        width: 20px;
        transform: translate3d(-50%, 0, 0) rotate(45deg);
      }

      body.is-nav-open .global-menu span:nth-child(2) {
        opacity: 0;
        transform: translate3d(-50%, 0, 0) scaleX(0.35);
      }

      body.is-nav-open .global-menu span:nth-child(3) {
        width: 20px;
        transform: translate3d(-50%, 0, 0) rotate(-45deg);
      }

      .page {
        min-height: 100vh;
        opacity: 0;
        transform: translate3d(0, 18px, 0);
        transition:
          opacity 960ms var(--ease) 80ms,
          transform 1120ms var(--ease-out) 80ms;
      }

      body.is-ready .page {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      .home-section {
        position: relative;
        width: 100%;
        overflow: hidden;
        background: var(--paper);
      }

      body.has-js .home-section {
        opacity: 1;
        transform: none;
      }

      body.has-js .home-section:first-child {
        opacity: 1;
        transform: none;
      }

      body.has-js .home-section.is-visible {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      .home-section + .home-section {
        border-top: 0;
      }

      .home-section--fv {
        height: 100vh;
        height: 100svh;
        min-height: 640px;
      }

      .home-section--fv iframe {
        height: 100%;
        min-height: 100%;
      }

      .scroll-cue {
        position: absolute;
        bottom: clamp(28px, 5vh, 56px);
        left: clamp(24px, 5vw, 72px);
        z-index: 20;
        display: inline-grid;
        grid-template-columns: auto 14px;
        gap: 12px;
        align-items: center;
        color: rgba(107, 79, 58, 0.72);
        font-family: "Cormorant Garamond", "Times New Roman", serif;
        font-size: 14px;
        letter-spacing: 0.14em;
        text-decoration: none;
        text-transform: uppercase;
        opacity: 0;
        transform: translate3d(0, 10px, 0);
        transition:
          opacity 900ms var(--ease) 820ms,
          transform 1100ms var(--ease-out) 820ms;
      }

      body.is-ready .scroll-cue {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      .scroll-cue__line {
        position: relative;
        display: block;
        width: 1px;
        height: 48px;
        overflow: hidden;
        background: rgba(107, 79, 58, 0.18);
      }

      .scroll-cue__line::before {
        position: absolute;
        top: -100%;
        left: 0;
        width: 1px;
        height: 100%;
        background: linear-gradient(180deg, rgba(107, 79, 58, 0), rgba(107, 79, 58, 0.76));
        content: "";
        animation: scroll-cue-line 2600ms var(--ease) infinite;
      }

      .scroll-cue__line::after {
        position: absolute;
        right: -3px;
        bottom: 1px;
        width: 7px;
        height: 7px;
        border-right: 1px solid rgba(107, 79, 58, 0.72);
        border-bottom: 1px solid rgba(107, 79, 58, 0.72);
        content: "";
        transform: rotate(45deg);
      }

      iframe {
        display: block;
        width: 100%;
        min-height: var(--desktop-height);
        height: var(--desktop-height);
        border: 0;
        background: var(--paper);
        overflow: hidden;
        overscroll-behavior: none;
      }

      @keyframes paper-drift {
        from {
          transform: translate3d(-14px, -10px, 0);
        }
        to {
          transform: translate3d(22px, 18px, 0);
        }
      }

      @keyframes opening-paper-breathe {
        from {
          opacity: 0.34;
          transform: translate3d(-10px, -8px, 0) scale(1);
        }
        to {
          opacity: 0.46;
          transform: translate3d(8px, 6px, 0) scale(1.015);
        }
      }

      @keyframes opening-ambient-line {
        to {

      }

      @keyframes opening-kicker-rule {

        };

        const normalizeAchievementTitles = () => {
          document.querySelectorAll(".achievements .section-title, .achievements .achievement-title").forEach((element) => {
            const label = (element.getAttribute("aria-label") || element.innerText || element.textContent || "")
              .replace(/\s+/g, " ")
              .trim();
            if (!label) return;
            element.dataset.flowReady = "en-static";
            element.dataset.enAchievementReady = "1";
            element.setAttribute("aria-label", label);
            element.textContent = label;
          });
        };

        const wrapWords = (element, className, propertyName, startIndex = 0, options = {}) => {
          if (!element) return startIndex;
          if (element.dataset.enMotionReady === className) {
            return startIndex + element.querySelectorAll("." + className).length;
          }
          const raw = options.preserveLines
            ? (element.innerText || element.textContent || "")
            : (element.getAttribute("aria-label") || element.innerText || element.textContent || "");
          const label = raw.replace(/\s+/g, " ").trim();
          if (!label) return startIndex;
          const lines = options.preserveLines
            ? raw.split(/\n+/).map((line) => line.replace(/\s+/g, " ").trim()).filter(Boolean)
            : [label];

          element.dataset.enMotionReady = className;
          element.setAttribute("aria-label", label);
          element.textContent = "";

          let index = startIndex;
          lines.forEach((line, lineIndex) => {
            if (lineIndex > 0) {
              element.append(document.createElement("br"));
            }
            line.split(/(\s+)/).forEach((part) => {
              if (!part) return;
              if (/^\s+$/.test(part)) {
                element.append(document.createTextNode(" "));
                return;
              }

              const span = document.createElement("span");
              span.className = className;
              span.setAttribute("aria-hidden", "true");
              span.style.setProperty(propertyName, index);
              span.textContent = part;
              element.append(span);
              index += 1;
            });
          });
          return index;
        };

        const normalize = () => {
          normalizePhilosophyIntro();
          normalizeAchievementTitles();
          document.querySelectorAll(".slide").forEach((slide) => {
            let headlineIndex = 0;
            slide.querySelectorAll(".headline-col").forEach((element, lineIndex) => {
              headlineIndex = wrapWords(element, "headline-word", "--word-index", headlineIndex);
              element.style.setProperty("--line-index", lineIndex);
            });
          });
          document.querySelectorAll(".work-title").forEach((element) =>
            wrapWords(element, "work-title-word", "--title-word-index", 0, { preserveLines: true })
          );
          document
            .querySelectorAll(".frame-shell .head .title, .frame-shell .initiative-title")
            .forEach((element) => wrapWords(element, "flow-word", "--flow-word-index"));
        };

        normalize();
        window.requestAnimationFrame(normalize);
      })();
    </script>

  </body>
</html>
