  </head>
  <body class="utility-body contact-page">
    <div class="utility-shell">
      <header class="site-header" aria-label="サイトヘッダー">
        <a class="brand-lockup" href="/top/" aria-label="亀屋日本伝統株式会社 トップへ">
          <span class="brand-mark" aria-hidden="true">
            <img src="/about/assets/figma/logo-mark.png" alt="" />
          </span>
          <span class="brand-text">
            <span class="brand-name">亀屋日本伝統株式会社</span>
            <span class="brand-roman">KAMEYA&nbsp;&nbsp;JAPAN&nbsp;&nbsp;TRADITION</span>
          </span>
        </a>
        <button class="menu-button" type="button" aria-label="メニューを開く">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
        </button>
      </header>

      <main class="utility-main">
        <section class="utility-hero" aria-labelledby="contact-title">
          <div>
            <p class="utility-kicker">Contact</p>
            <h1 class="utility-title" id="contact-title">お問い合わせ</h1>
            <p class="utility-lead">
              講演、展示、空間への工芸導入、商品企画、文化体験などのご相談は、以下のフォームよりお送りください。
            </p>
          </div>
        </section>

        <section class="utility-content contact-grid" aria-label="お問い合わせフォーム">
          <form
            class="utility-panel contact-form"
            action=""
            method="post"
            data-contact-form
            data-gas-endpoint=""
            data-mail-to="desk@kameya-japan-tradition.com"
          >
            <input type="hidden" name="formStartedAt" data-contact-started-at />
            <input type="hidden" name="source" value="site-contact" />
            <input class="contact-honeypot" name="website" type="text" tabindex="-1" autocomplete="off" aria-hidden="true" />
            <div class="form-field">
              <label for="name">お名前 <span class="required">必須</span></label>
              <input id="name" name="name" type="text" autocomplete="name" maxlength="80" required />
            </div>
            <div class="form-field">
              <label for="company">会社名・所属 <span class="required">必須</span></label>
              <input id="company" name="company" type="text" autocomplete="organization" maxlength="120" required />
            </div>
            <div class="form-field">
              <label for="email">メールアドレス <span class="required">必須</span></label>
              <input id="email" name="email" type="email" autocomplete="email" maxlength="120" required />
            </div>
            <div class="form-field">
              <label for="phone">電話番号</label>
              <input id="phone" name="phone" type="tel" autocomplete="tel" maxlength="40" />
            </div>
            <div class="form-field">
              <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
              <textarea id="message" name="message" minlength="10" maxlength="2000" required></textarea>
            </div>
            <div class="form-actions">
              <button class="submit-button" type="submit">送信する</button>
              <a class="text-link" href="mailto:desk@kameya-japan-tradition.com">メールで送る</a>
            </div>
            <p class="form-status" data-contact-status aria-live="polite"></p>
            <p class="contact-support">
              個人情報の取り扱いは<a class="contact-inline-link" href="/privacy/">プライバシーポリシー</a>をご確認ください。
            </p>
          </form>
        </section>

        <footer class="site-footer">
          <span>© 2026 亀屋日本伝統株式会社</span>
          <nav class="footer-links" aria-label="フッターリンク">
            <a href="/privacy/">プライバシーポリシー</a>
            <a href="/deal/">特定商取引法に基づく表記</a>
          </nav>
        </footer>
      </main>
    </div>
    <script src="/shared/js/reveal.js" defer></script>
    <script src="/shared/js/contact-form.js" defer></script>
    <script src="/shared/js/page-transition.js?v=20260619-menu-numbering-20" defer></script>
  </body>
</html>
