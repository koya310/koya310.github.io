    <style>
      :root {
        --paper: #f8f5ec;
        --ink: #1a1a1a;
        --muted: rgba(26, 26, 26, 0.64);
        --line: rgba(26, 26, 26, 0.16);
        --accent: #6b4f3a;
        --accent-soft: rgba(107, 79, 58, 0.12);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(248, 245, 236, 0.98), rgba(244, 238, 223, 0.92)),
          radial-gradient(circle at 80% 12%, rgba(107, 79, 58, 0.08), transparent 32%);
        color: var(--ink);
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      }
      main {
        width: min(440px, 100%);
        padding: 40px;
        border: 1px solid var(--line);
        background: rgba(248, 245, 236, 0.86);
      }
      .kicker {
        margin: 0 0 16px;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        font-weight: 500;
        letter-spacing: 0.06em;
        line-height: 1.5;
      }
      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.9;
      }
      label {
        display: grid;
        gap: 8px;
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 13px;
      }
      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 0;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        font: 16px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      input:focus {
        border-color: rgba(107, 79, 58, 0.58);
        box-shadow: 0 0 0 3px var(--accent-soft);
        outline: none;
      }
      button {
        width: 100%;
        min-height: 48px;
        margin-top: 8px;
        border: 1px solid var(--accent);
        border-radius: 0;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: 600 14px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
      }
      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }
      .error {
        min-height: 22px;
        margin: 16px 0 0;
        color: #8a2b1d;
        font: 13px/1.7 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      @media (max-width: 520px) {
        body { padding: 20px; }
        main { padding: 28px 24px; }
        h1 { font-size: 24px; }
      }
    </style>

          const baseKey = await crypto.subtle.importKey(
            "raw",
            encoder.encode(id + "\n" + pass),
            "PBKDF2",
            false,
            ["deriveKey"]
          );
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: fromBase64(payload.salt), iterations: payload.iterations, hash: "SHA-256" },
            baseKey,
            { name: "AES-GCM", length: 256 },
            true,
            ["decrypt"]
          );
        }

        async function decryptWithKey(key) {
          const packed = fromBase64(payload.ciphertext);
          const body = packed.slice(0, -16);
          const tag = packed.slice(-16);
          const encrypted = new Uint8Array(body.length + tag.length);
          encrypted.set(body);
          encrypted.set(tag, body.length);
          const plain = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: fromBase64(payload.iv), tagLength: 128 },
            key,
            encrypted
          );
          return decoder.decode(plain);
        }

        async function reveal(html) {
          document.open();
          document.write(html);
          document.close();
        }

        async function tryStoredKey() {
          const stored = sessionStorage.getItem(storageKey);
          if (!stored) return;
          try {
            const key = await crypto.subtle.importKey("raw", fromBase64(stored), "AES-GCM", true, ["decrypt"]);
            await reveal(await decryptWithKey(key));
          } catch {
            sessionStorage.removeItem(storageKey);
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          error.textContent = "";
          button.disabled = true;
          try {
            const key = await deriveKey(idInput.value.trim(), passInput.value);
            const html = await decryptWithKey(key);
            const rawKey = new Uint8Array(await crypto.subtle.exportKey("raw", key));
            sessionStorage.setItem(storageKey, toBase64(rawKey));
            await reveal(html);
          } catch {
            error.textContent = "IDまたはPassが違います。";
            passInput.value = "";
            passInput.focus();
          } finally {
            button.disabled = false;
          }
        });

        tryStoredKey();
      })();
    </script>
  </body>
</html>
