<!DOCTYPE html>
<html lang="ja" data-protected-route="kameya-site">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>亀屋日本伝統株式会社 | Access</title>
    <style>
      :root {
        --paper: #f8f5ec;
        --ink: #1a1a1a;
        --muted: rgba(26, 26, 26, 0.64);
        --line: rgba(26, 26, 26, 0.16);
        --accent: #6b4f3a;
        --accent-soft: rgba(107, 79, 58, 0.12);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(248, 245, 236, 0.98), rgba(244, 238, 223, 0.92)),
          radial-gradient(circle at 80% 12%, rgba(107, 79, 58, 0.08), transparent 32%);
        color: var(--ink);
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      }
      main {
        width: min(440px, 100%);
        padding: 40px;
        border: 1px solid var(--line);
        background: rgba(248, 245, 236, 0.86);
      }
      .kicker {
        margin: 0 0 16px;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        font-weight: 500;
        letter-spacing: 0.06em;
        line-height: 1.5;
      }
      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.9;
      }
      label {
        display: grid;
        gap: 8px;
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 13px;
      }
      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 0;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        font: 16px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      input:focus {
        border-color: rgba(107, 79, 58, 0.58);
        box-shadow: 0 0 0 3px var(--accent-soft);
        outline: none;
      }
      button {
        width: 100%;
        min-height: 48px;
        margin-top: 8px;
        border: 1px solid var(--accent);
        border-radius: 0;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: 600 14px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
      }
      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }
      .error {
        min-height: 22px;
        margin: 16px 0 0;
        color: #8a2b1d;
        font: 13px/1.7 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      @media (max-width: 520px) {
        body { padding: 20px; }
        main { padding: 28px 24px; }
        h1 { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">Private Preview</p>
      <h1>亀屋日本伝統株式会社</h1>
      <p>共有されたIDとPassを入力してください。</p>
      <form id="access-form" autocomplete="off">
        <label>ID<input id="access-id" name="id" type="text" autocomplete="username" required /></label>
        <label>Pass<input id="access-pass" name="pass" type="password" autocomplete="current-password" required /></label>
        <button type="submit">表示</button>
        <div class="error" id="access-error" role="status" aria-live="polite"></div>
      </form>
    </main>
    <script type="application/json" id="protected-payload">{"salt":"lXKhP4aONU8ye8cx4BbpHg==","iv":"2PIp8SQA0mhelGd/","ciphertext":"qgnIl+tvMyKbdViiQcxpQof9KVr+esDz26pXx0OzxhHNZwpyzd+kli+6aI27QvZejnxReJVchTPG6BoFzqqgGfO0NYAsoOAFoT3yUSJQ/sHsATQ0WSnz3JvSQjOSV6/I9pG2X7c6W1jYklmDY7QgPUbYUR40UQ4iqQzws2cIIKNGQJYRaUug21vkqaxR9uWCcqsdwa7vzY0FOq98qsn6pHweSQPN6R+O+HvYK//YxVMOE933rzNvFZXlrQGYwaHNUpP2ApXnys9dzxz3WiNU7gmp0sZgvCOSV7L+eQRlbmraxE/KxAP+A+OkiNLiBSGxb7bJsTp1rN/+mBXGktSJxQdH/VZnxZun94bSsF5Ka+kjNGaxQYrBVve+P8/lAcIHCSyEiXJv5K3lzhrv2lG+XLVOdkmN5rtITB9G2Vx+9wD/a9bFDgpoI85A5+ukTPaV5ErUcZxKRSS5Vdl/gvhnw1hoSDQ0rjDb7Sp/JzqAoSu6XcGIU2VLL2DJFYj9dfKhB9KLFap84OTIgyjIhO/H/Vds6mJlBPUoxErBlCaGSE2lt+5lDwjN0pSriwlG9IQGbuSK4HVdMcJDgjzNRCdxFap/S2z4zTEgbYd/yioQ40cQu92WChus0iJ6+eXMMNMvEZc404RhbJmdzQbPW2G/4zkzUe3hwllVy2bx4G9fv8mB7Kloryre0aUFi1+ugac1PWuJE5LkJ8f6mdE/RzHaa/NBl9vxBuSQ4XDXX2wsZ7mSvJbFFoaxfNAPcXfVB8pMbZhrGvn/9RSjKd91Ta3L33CX3Rd7YfWoZxXIvAmnlxh4iz+4ZAV5G3JyC4L0hQG9f39eEE693syUHcVPWgif4Ak9v10aFYcrav3XaqHLls/pUj7VFJIcvuBE+Uk+zgqqK/25aCddHQe+IVfcWPLSlnjsiKfrATjBm1rCImKlDrURJEK+GO0FO6FRpSoXvAJM3M+Ht3O8DxDLfvRkDSHHWR8t1DbRHK/e1MT2ZJtIgWwd40BGxHQ6x9HZm+vknL0uyelnQQcE","iterations":240000}</script>
    <script>
      (() => {
        const payload = JSON.parse(document.getElementById("protected-payload").textContent);
        const storageKey = "kameyaSitePreviewKey";
        const form = document.getElementById("access-form");
        const idInput = document.getElementById("access-id");
        const passInput = document.getElementById("access-pass");
        const error = document.getElementById("access-error");
        const button = form.querySelector("button");
        const decoder = new TextDecoder();
        const encoder = new TextEncoder();

        function fromBase64(value) {
          return Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
        }

        function toBase64(bytes) {
          let binary = "";
          bytes.forEach((byte) => { binary += String.fromCharCode(byte); });
          return btoa(binary);
        }

        async function deriveKey(id, pass) {
          const baseKey = await crypto.subtle.importKey(
            "raw",
            encoder.encode(id + "\n" + pass),
            "PBKDF2",
            false,
            ["deriveKey"]
          );
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: fromBase64(payload.salt), iterations: payload.iterations, hash: "SHA-256" },
            baseKey,
            { name: "AES-GCM", length: 256 },
            true,
            ["decrypt"]
          );
        }

        async function decryptWithKey(key) {
          const packed = fromBase64(payload.ciphertext);
          const body = packed.slice(0, -16);
          const tag = packed.slice(-16);
          const encrypted = new Uint8Array(body.length + tag.length);
          encrypted.set(body);
          encrypted.set(tag, body.length);
          const plain = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: fromBase64(payload.iv), tagLength: 128 },
            key,
            encrypted
          );
          return decoder.decode(plain);
        }

        async function reveal(html) {
          document.open();
          document.write(html);
          document.close();
        }

        async function tryStoredKey() {
          const stored = sessionStorage.getItem(storageKey);
          if (!stored) return;
          try {
            const key = await crypto.subtle.importKey("raw", fromBase64(stored), "AES-GCM", true, ["decrypt"]);
            await reveal(await decryptWithKey(key));
          } catch {
            sessionStorage.removeItem(storageKey);
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          error.textContent = "";
          button.disabled = true;
          try {
            const key = await deriveKey(idInput.value.trim(), passInput.value);
            const html = await decryptWithKey(key);
            const rawKey = new Uint8Array(await crypto.subtle.exportKey("raw", key));
            sessionStorage.setItem(storageKey, toBase64(rawKey));
            await reveal(html);
          } catch {
            error.textContent = "IDまたはPassが違います。";
            passInput.value = "";
            passInput.focus();
          } finally {
            button.disabled = false;
          }
        });

        tryStoredKey();
      })();
    </script>
  </body>
</html>
