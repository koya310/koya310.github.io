<!DOCTYPE html>
<html lang="ja" class="is-auth-checking" data-protected-route="kameya-site">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>亀屋日本伝統株式会社 | Access</title>
    <style>
      :root {
        --paper: #f8f5ec;
        --paper-deep: #f1eadc;
        --ink: #1a1a1a;
        --muted: rgba(26, 26, 26, 0.64);
        --line: rgba(26, 26, 26, 0.16);
        --accent: #6b4f3a;
        --accent-soft: rgba(107, 79, 58, 0.12);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      html.is-auth-checking body,
      html.is-embedded-waiting body {
        background: transparent;
      }
      html.is-auth-checking main,
      html.is-embedded-waiting main {
        opacity: 0;
        pointer-events: none;
      }
      body {
        display: flex;
        min-height: 100dvh;
        align-items: center;
        justify-content: center;
        place-items: center;
        padding: clamp(24px, 6vw, 64px);
        background: var(--paper-deep);
        color: var(--ink);
        font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      }
      main {
        width: min(640px, 100%);
        padding: clamp(32px, 5vw, 56px);
        border: 1px solid var(--line);
        background: rgba(248, 245, 236, 0.9);
        transition: opacity 180ms ease;
      }
      .kicker {
        margin: 0 0 16px;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 3vw, 40px);
        font-weight: 500;
        letter-spacing: 0;
        line-height: 1.4;
      }
      p {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.9;
      }
      label {
        display: grid;
        gap: 8px;
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 13px;
      }
      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid var(--line);
        border-radius: 0;
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        font: 16px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      input:focus {
        border-color: rgba(107, 79, 58, 0.58);
        box-shadow: 0 0 0 3px var(--accent-soft);
        outline: none;
      }
      button {
        width: 100%;
        min-height: 48px;
        margin-top: 8px;
        border: 1px solid var(--accent);
        border-radius: 0;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: 600 14px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
      }
      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }
      .error {
        min-height: 22px;
        margin: 16px 0 0;
        color: #8a2b1d;
        font: 13px/1.7 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      @media (max-width: 520px) {
        body { padding: 20px; }
        main { padding: 32px 24px; }
        h1 { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">Private Preview</p>
      <h1>亀屋日本伝統株式会社</h1>
      <p>共有されたIDとPassを入力してください。</p>
      <form id="access-form" autocomplete="off">
        <label>ID<input id="access-id" name="id" type="text" autocomplete="username" required /></label>
        <label>Pass<input id="access-pass" name="pass" type="password" autocomplete="current-password" required /></label>
        <button type="submit">表示</button>
        <div class="error" id="access-error" role="status" aria-live="polite"></div>
      </form>
    </main>
    <script type="application/json" id="protected-payload">{"salt":"BRzKv5r5n3MbhjuCG6Bi6A==","iv":"+7bonkVkkozRAGUa","ciphertext":"bI/3q07HND+Y/L6M47B8iRjQWfxv7hw14k9sSY4vkMkYO3nUgqqLOTlKcQ2XKsBF90CSUAdt+K3TxvB4W2bBwk0Mc8/HvOKUR5elZ/hkSxHFas/ggOUI/x+A8ZkBrdMRz2SITpT3YkvxBnBX/nfyVpWmL+79c6CMGMqrzqIKn+pRqNMCh/MgaO/NgMSoOqEDsoqv4M161I9oDCDBvpY4Rz+Oficq9LYeDIsxysUJT10ws88VmZAt4uwd0J4vTtIM77IyBebR5NbxMajR08WxOUPGKeawuXcIfp1vLMfGnqD9AwoKHgo7hWmP3MyhpkHhzHsv7hVUeQf1Awp24FPF3IPKUDpzPYHdKVl0YnlJyUmLobtF7pQpunJoXouiBgXTJ9RLub+wyLsclKfGeQtAmUI2L5SNapTkvzxiX3jmsgDwZuZ6r9IF6ABBpIDoQntLiGBq0a/oX5R4phdMoDUpedGrLcrFBisHKgZNSgPaG5aOHRUWLcCZkUtDGg0+BSwyWrgh44H0gEHOpJ4cs2qVQRWftBvTWY9+jYZ2RagA3DDTXtJVwqWG6CM5aTiM8+YKYsmSuVKt8VP6Ak7eNwVc0Bl94ngx+bUGdE+LDOpoHHQnLMBepIqRzHdPzPfpio9LBHRkMDlbbnQinrB+Ln3/ehpy6gPImkx5K4+FrINnHBygH1/blnCJZEoO2VZz9IbagI9TL1jTV1BRL8e5e+OQOtXZWaywYiNrn5ZvGU8NC0ZIIlmmqIT/U1dfmosegh/2xIB/BCufb7/tin5sgcxtVmdttH8yAXIJH2zDCdimgNUvBx8gQf4dawkOGRKzwXHJkyvc2FGx8ImMYZqAcMdDbJJ8S2jdX27jiHJdiFTCulaX+hDb5i1fLy6pNbW3gS37qZt36Gruog+UPmYYFVMwsz7fR4hlV+71zcHbXmHSJfLa0szJxOSk58yF0IC8mdV/rZN3j/LZrrdYaiLdgL81APYklMM9X6a7G2zaQ80wiAZbUqbyvBzjQ7mXlusFHFC2zrrBBJ70","iterations":240000}</script>
    <script>
      (() => {
        const payload = JSON.parse(document.getElementById("protected-payload").textContent);
        const storageKey = "kameyaSitePreviewKey";
        const isEmbedded = window.self !== window.top;
        const form = document.getElementById("access-form");
        const idInput = document.getElementById("access-id");
        const passInput = document.getElementById("access-pass");
        const error = document.getElementById("access-error");
        const button = form.querySelector("button");
        const decoder = new TextDecoder();
        const encoder = new TextEncoder();

        function fromBase64(value) {
          return Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
        }

        function toBase64(bytes) {
          let binary = "";
          bytes.forEach((byte) => { binary += String.fromCharCode(byte); });
          return btoa(binary);
        }

        async function deriveKey(id, pass) {
          const baseKey = await crypto.subtle.importKey(
            "raw",
            encoder.encode(id + "\n" + pass),
            "PBKDF2",
            false,
            ["deriveKey"]
          );
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: fromBase64(payload.salt), iterations: payload.iterations, hash: "SHA-256" },
            baseKey,
            { name: "AES-GCM", length: 256 },
            true,
            ["decrypt"]
          );
        }

        async function decryptWithKey(key) {
          const packed = fromBase64(payload.ciphertext);
          const body = packed.slice(0, -16);
          const tag = packed.slice(-16);
          const encrypted = new Uint8Array(body.length + tag.length);
          encrypted.set(body);
          encrypted.set(tag, body.length);
          const plain = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: fromBase64(payload.iv), tagLength: 128 },
            key,
            encrypted
          );
          return decoder.decode(plain);
        }

        async function reveal(html) {
          return new Promise((resolve) => {
            window.setTimeout(() => {
              document.open("text/html", "replace");
              document.write(html);
              document.close();
              resolve();
            }, 0);
          });
        }

        async function tryStoredKey() {
          const stored = sessionStorage.getItem(storageKey);
          if (!stored) return false;
          try {
            const key = await crypto.subtle.importKey("raw", fromBase64(stored), "AES-GCM", true, ["decrypt"]);
            await reveal(await decryptWithKey(key));
            return true;
          } catch {
            sessionStorage.removeItem(storageKey);
            return false;
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          error.textContent = "";
          button.disabled = true;
          try {
            const key = await deriveKey(idInput.value.trim(), passInput.value);
            const html = await decryptWithKey(key);
            const rawKey = new Uint8Array(await crypto.subtle.exportKey("raw", key));
            sessionStorage.setItem(storageKey, toBase64(rawKey));
            await reveal(html);
          } catch {
            error.textContent = "IDまたはPassが違います。";
            passInput.value = "";
            passInput.focus();
          } finally {
            button.disabled = false;
          }
        });

        (async () => {
          const unlocked = await tryStoredKey();
          if (unlocked) return;
          if (isEmbedded) {
            document.documentElement.classList.remove("is-auth-checking");
            document.documentElement.classList.add("is-embedded-waiting");
            return;
          }
          document.documentElement.classList.remove("is-auth-checking");
          idInput.focus();
        })();
      })();
    </script>
  </body>
</html>
