        height: var(--frame-height);

        overflow: visible;
        background-color: transparent;

  <body>
    <div class="co-stage">
      <main class="co-page" aria-labelledby="co-title">
        <img class="artifact artifact--pottery reveal-target" src="assets/flow/pottery.webp" alt="" data-reveal />
        <img class="artifact artifact--wood reveal-target" src="assets/flow/wood-tray-full.webp" alt="" data-reveal />
        <img class="artifact artifact--bowl reveal-target" src="assets/flow/bowl-full.webp" alt="" data-reveal />
        <img class="artifact artifact--red reveal-target" src="assets/flow/red-table-full.webp" alt="" data-reveal />

        <div class="title-block reveal-target" id="co-title" data-reveal>
          <span class="title-rule" aria-hidden="true"></span>
          <div class="title-lines">
            <p class="title-secondary">作りませんか</p>
            <p>文化を共に</p>
          </div>
          <span class="title-rule" aria-hidden="true"></span>
        </div>

        <section class="copy-block copy-block--one reveal-target" aria-label="文化を人の心へ接続する" data-reveal>
          <p>私たちは、工芸を、限られた人だけの世界ではなく、現代を生きる人々の人生や時間、空間や体験の中へ届けていきたいと考えています。</p>
<p>文化は、歴史の中に残るだけではなく、人が触れ、惹かれ、人生の中へ取り入れることで、その人の中にも生き続けていくものだと思うからです。</p>
        </section>

        <section class="copy-block copy-block--two reveal-target" aria-label="工芸が生む体験" data-reveal>
          <p>工芸が入ることで、これまでとは違う体験が生まれるかもしれない。</p>
<p>これまでとは違う空気感が生まれるかもしれない。これまでとは違う「好き」が生まれるかもしれない。</p>
        </section>

        <section class="copy-block copy-block--three reveal-target" aria-label="新しい出会いをつくる" data-reveal>
          <p>私たちは、そんな文化との新しい出会いを、これからもさまざまな形でつくっていきます。</p>
        </section>
      </main>
    </div>

    <script>
      function fitArtboard() {
        const stage = document.querySelector(".co-stage");
        const page = document.querySelector(".co-page");
        const viewportWidth = document.documentElement.clientWidth;
        const artboard = {
          width: page.offsetWidth,
          height: page.offsetHeight,
        };
        stage.style.height = `${artboard.height}px`;
        stage.style.minHeight = `${artboard.height}px`;
      }

      function setupReveal() {
        const targets = [...document.querySelectorAll("[data-reveal]")];
        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const splitFlowTitles = () => {
          document.querySelectorAll(".title-lines p").forEach((element) => {
            if (element.dataset.flowReady === "1") return;
            const text = element.textContent.trim();
            element.dataset.flowReady = "1";
            element.setAttribute("aria-label", text);
            element.textContent = "";
            Array.from(text).forEach((char, index) => {
              const span = document.createElement("span");
              span.className = char === " " ? "flow-char flow-char--space" : "flow-char";
              span.setAttribute("aria-hidden", "true");
              span.style.setProperty("--flow-index", index);
              span.textContent = char === " " ? "\u00a0" : char;
              element.append(span);
            });
          });
        };
        const show = (target) => {
          if (!target || target.classList.contains("is-visible")) return;
          target.classList.add("is-visible");
        };
        const revealIndexes = (indexes) => indexes.forEach((index) => show(targets[index]));
        const revealAll = () => targets.forEach(show);
        let parentViewportTick = false;

        const revealFromParentViewport = () => {
          try {
            const frame = window.frameElement;
            const parentWindow = window.parent;
            if (!frame || !parentWindow) return false;
            const parentHeight = parentWindow.innerHeight || parentWindow.document.documentElement.clientHeight || 0;
            const frameRect = frame.getBoundingClientRect();
            const visible = targets
              .map((target, index) => {
                const rect = target.getBoundingClientRect();
                const top = frameRect.top + rect.top;
                const bottom = frameRect.top + rect.bottom;
                return top < parentHeight * 0.9 && bottom > parentHeight * -0.12 ? index : null;
              })
              .filter((index) => index !== null);
            if (visible.length) revealIndexes(visible);
            return true;
          } catch {
            return false;
          }
        };

        const scheduleParentViewportReveal = () => {
          if (parentViewportTick) return;
          parentViewportTick = true;
          window.requestAnimationFrame(() => {
            parentViewportTick = false;
            revealFromParentViewport();
          });
        };

        const startParentViewportTracking = () => {
          revealFromParentViewport();
          try {
            window.parent.addEventListener("scroll", scheduleParentViewportReveal, { passive: true });
            window.parent.addEventListener("resize", scheduleParentViewportReveal);
            [240, 900, 1800].forEach((delay) => window.setTimeout(scheduleParentViewportReveal, delay));
          } catch {
            // Cross-origin file previews fall back to kameya:section-visible.
          }
        };

        splitFlowTitles();

        if (prefersReducedMotion || !("IntersectionObserver" in window)) {
          revealAll();
          return;
        }

        document.body.classList.add("motion-ready");

        if (window.self !== window.top) {
          window.addEventListener("message", (event) => {
            if (event.data?.type === "kameya:nested-visible" && Array.isArray(event.data.visible)) revealIndexes(event.data.visible);
            if (event.data?.type === "kameya:section-visible" && !revealFromParentViewport()) revealAll();
          });
          if (location.protocol !== "file:") startParentViewportTracking();
          try {
            window.parent.postMessage({ type: "kameya:child-ready" }, "*");
          } catch {
            // Parent notification is best-effort; viewport tracking above is the primary path.
          }
          return;
        }

        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) return;
              entry.target.classList.add("is-visible");
              observer.unobserve(entry.target);
            });
          },
          {
            root: null,
            rootMargin: "0px 0px -6% 0px",
            threshold: 0.12,
          },
        );

        requestAnimationFrame(() => {
          targets.forEach((target) => observer.observe(target));
        });
      }

      fitArtboard();
      setupReveal();
      window.addEventListener("resize", fitArtboard, { passive: true });
    </script>
  </body>
</html>
